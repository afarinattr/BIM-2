<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Visualizador 3D</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white !important;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    model-viewer {
      width: 90vw;
      height: 90vh;

      /* 🔥 FORZAR FONDO REAL DEL CANVAS */
      --poster-color: white;
      background-color: white !important;
    }
  </style>
</head>

<body>

<model-viewer
  src="./D355-T02-1-Vista3D-Orto3D1.glb"
  camera-controls
  auto-rotate
  shadow-intensity="0"
  environment-image=""
  tone-mapping="neutral"
  style="background-color: white !important;"
>
</model-viewer>

</body>
</html>
