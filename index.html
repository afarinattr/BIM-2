<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Visualizador 3D</title>

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
      body {
        margin: 0;
        background-color: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      model-viewer {
        width: 90vw;
        height: 90vh;
      }
    </style>
  </head>

  <body>
    <model-viewer
      src="./D355-T02-1-Vista3D-Orto3D1.glb"
      alt="Modelo 3D"
      auto-rotate
      camera-controls
      shadow-intensity="1"
      environment-image="neutral"
    ></model-viewer>
  </body>
</html>
