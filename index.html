<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Visualizador 3D</title>

  <!-- model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #ffffff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    model-viewer {
      width: 90vw;
      height: 90vh;
      background: #ffffff;
    }

    /* Hotspot básico (si luego los usas) */
    .Hotspot {
      background: red;
      border: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<model-viewer
  src="./D355-T02-1-Vista3D-Orto3D1.glb"
  camera-controls
  auto-rotate
  shadow-intensity="0.8"
  exposure="1"
  tone-mapping="neutral"
  ar
  ar-modes="webxr scene-viewer quick-look"
>
</model-viewer>

</body>
</html>
